{{ define "main" }}
<article style="padding: 2rem; max-width: 800px; margin: 0 auto; font-family: sans-serif; line-height: 1.6;">
  <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">{{ .Title }}</h1>
  <div style="color: #888; margin-bottom: 2rem;">
    Veröffentlicht am: {{ .Date.Format "02.01.2006" }}
  </div>

  <div class="content-body">
    {{ .Content }}
  </div>

  <div style="margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #eee;">
    <a href="/" style="color: #0055ff;">&larr; Zurück zur Startseite</a>
  </div>
</article>
{{ end }}
