{{ define "main" }}
<div class="max-w-4xl mx-auto py-20 px-5">
    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
        <img src="{{ .Params.icon }}" alt="" class="w-16 h-16">
        <div>
            <h1 class="text-4xl font-bold">{{ .Title }}</h1>
            <p class="text-xl text-slate-600">{{ .Params.tagline }}</p>
        </div>
    </div>

    <!-- Content (Markdown wird hier eingefügt) -->
    <div class="prose max-w-none">
        {{ .Content }}
    </div>
</div>
{{ end }}
