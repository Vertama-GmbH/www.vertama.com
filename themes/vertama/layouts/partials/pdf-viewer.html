<section id="editorial-viewer" class="py-6 md:py-10 bg-white">
  <div class="max-w-[1200px] mx-auto px-4">

    <h2 class="text-xl md:text-2xl font-bold mb-4">{{ .title }}</h2>

    <div class="relative w-full h-[60vh] md:h-[75vh] shadow-2xl border border-slate-200 rounded-lg overflow-hidden bg-slate-50">

      <object
      data="{{ .pdf_url }}#page=1&zoom=FitV&view=FitV"
      type="application/pdf"
      class="w-full h-full"
      >
      <div class="flex flex-col items-center justify-center h-full p-8 text-center">
        <p class="text-slate-500 mb-4">Vorschau auf diesem Gerät nicht verfügbar.</p>
        <a href="{{ .pdf_url }}" class="bg-vertama text-white px-6 py-2 rounded-md font-bold">PDF öffnen</a>
      </div>
      </object>

    </div>
  </div>
</section>
