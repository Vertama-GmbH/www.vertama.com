{{ $text := .text }}
{{ $url := .url }}
{{ $variant := .variant | default "primary" }}
{{ $ariaLabel := .ariaLabel }}

<a href="{{ $url | safeURL }}"
   {{ if $ariaLabel }}aria-label="{{ $ariaLabel }}"{{ end }}
   class="inline-flex items-center justify-center gap-2 px-8 py-4 border border-transparent font-bold rounded-lg shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-vertama focus:ring-offset-2 min-h-[48px]
   {{ if eq $variant "primary" }}
    text-white bg-vertama hover:bg-vertama-light
   {{ else if eq $variant "primaryNoArrow" }}
    text-white bg-vertama hover:bg-vertama-light
   {{ else if eq $variant "secondary" }}
    text-vertama bg-white border-2 border-vertama hover:bg-vertama-light hover:text-white hover:border-white
   {{ else if eq $variant "hover" }}
    text-white bg-vertama-light
   {{ else if eq $variant "focus" }}
    text-white bg-vertama-light ring-2 ring-vertama ring-offset-2
   {{ end }}"
>
    {{ $text }}

<!-- Optional: Arrow Icon für Primary -->
{{ if eq $variant "primary" }}
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
</svg>
{{ end }}
</a>
