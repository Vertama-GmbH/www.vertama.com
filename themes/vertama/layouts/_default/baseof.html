<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" class="min-h-screen bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    
    <!-- Favicon -->
    <link rel="icon" href="{{ "images/favicon.png" | relURL }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ "css/theme.css" | absURL }}">

    {{ block "head" . }}{{ end }}
</head>
<body class="font-sans text-slate-600">
    <a href="#main-content" class="skip-link">Zum Hauptinhalt springen</a>
    
    {{ partial "header/header.html" . }}
    
    <main id="main-content" style="opacity: 1; transform: none;">
        {{ block "main" . }}{{ end }}
    </main>
    
    {{ partial "footer/footer.html" . }}
    
    <!-- Scripts -->
    <script src="{{ "js/main.js" | relURL }}"></script>
    {{ block "scripts" . }}{{ end }}
</body>
</html>
