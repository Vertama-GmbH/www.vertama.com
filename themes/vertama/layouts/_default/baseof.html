<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" class="min-h-screen bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>

    <!-- Description (SEO + Screen Reader context) -->
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="{{ .Site.Params.brand.themeColor | default "#005e7b" }}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ (.Site.Params.brand.icon | default "/images/favicon.svg") | relURL }}">

    <!-- Tailwind CSS CDN - KEIN Build-Prozess! -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'vertama':            '#005e7b',
                        'vertama-medium':     '#007599',
                        'vertama-light':      '#008ab5',
                        'vertama-gray':       '#575656',
                        'vertama-gray-light': '#EEEEEE',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    fontFeatureSettings: {
                        'tnum': '"tnum"',
                        'cv11': '"cv11"',
                        'ss01': '"ss01"',
                        'case': '"case"',
                    }
                }
            },
            plugins: [
                function({ addUtilities, theme }) {
                    const settings = theme('fontFeatureSettings');
                    const utilities = Object.entries(settings).map(([key, value]) => ({
                        [`.font-feature-${key}`]: { fontFeatureSettings: value },
                    }));
                    addUtilities(utilities);
                }
            ]
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ "css/theme.css" | relURL }}">

    {{ partial "umami.html" . }}

    {{ block "head" . }}{{ end }}
</head>
<body class="font-sans text-slate-700 antialiased min-h-screen flex flex-col bg-white">

<!-- Skip Link (Accessibility) -->
<a href="#main-content"
   class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[100] focus:px-4 focus:py-2 focus:bg-vertama focus:text-white focus:rounded focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-vertama">
    {{ i18n "skip_to_main" }}
</a>

{{ partial "header/header.html" . }}

<main id="main-content" class="pt-24 flex-1" tabindex="-1">
    {{ block "main" . }}{{ end }}
</main>

{{ partial "footer/footer.html" . }}

<script src="{{ "js/main.js" | relURL }}"></script>

{{ if .Params.use_animations }}
<script type="module">
    import { animate, inView } from "https://cdn.skypack.dev/motion";
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!prefersReduced) {
        inView('.fade-in', ({ target }) => {
            animate(target,
              { opacity: [0, 1], y: [20, 0] },
              { duration: 0.6, easing: 'ease-out' }
            );
        });
    }
</script>
{{ end }}

{{ block "scripts" . }}{{ end }}
</body>
</html>
