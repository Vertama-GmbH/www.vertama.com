                    <div id="news-container">
                        {{NEWS_CONTENT}}
                    </div>

                    <script>
                        (function() {
                            var container = document.getElementById('news-container');
                            if (!container) return;

                            // 1. Logik: Falls keine News vom Build-Script geliefert wurden
                            if (container.innerHTML.trim() === "" ||
                                container.innerHTML.includes('{{NEWS_CONTENT}}') ||
                                container.querySelector('.empty-state')) {
                                container.innerHTML = '<div style="text-align: center; padding: 80px 20px;">' +
                                    '<h2 style="color: #666; margin-bottom: 15px;">Noch keine News veröffentlicht</h2>' +
                                    '<p style="color: #999;">Bald gibt es hier Neuigkeiten!</p>' +
                                    '</div>';
                            }

                            // 2. Logik: Toggle Funktionalität via Event Delegation
                            container.addEventListener('click', function(e) {
                                var header = e.target.closest('.news-item-header');
                                if (header) {
                                    var item = header.parentElement;
                                    if (item) {
                                        item.classList.toggle('expanded');
                                    }
                                }
                            });
                        })();
                    </script>
