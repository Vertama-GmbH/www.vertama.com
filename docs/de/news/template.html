                    <div id="news-container">
                        {{NEWS_CONTENT}}
                    </div>

                    <script>
                        // Wichtig für dynamisch generierte MD-Inhalte:
                        // Wir hängen den Listener an den Container, damit er auch für
                        // später konvertierte Inhalte funktioniert.
                        document.getElementById('news-container').addEventListener('click', function(e) {
                            var header = e.target.closest('.news-item-header');
                            if (header) {
                                header.parentElement.classList.toggle('expanded');
                            }
                        });

                        // Fallback falls nichts geladen wurde
                        (function() {
                            var container = document.getElementById('news-container');
                            if (container && container.innerHTML.trim() === '{{NEWS_CONTENT}}') {
                                // Zeigt an, wenn der Platzhalter nicht ersetzt wurde
                            }
                        })();
                    </script>
