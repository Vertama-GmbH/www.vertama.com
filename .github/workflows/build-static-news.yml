name: Build Static News Page

on:
  workflow_dispatch: # Manual trigger only - superseded by deploy-pages.yml

concurrency:
  group: "pages-deployment"
  cancel-in-progress: false # Wichtig: Er soll nicht abbrechen, sondern warten

jobs:
  build-static-html:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Dependencies
        run: npm install marked@12.0.0
      
      - name: Build Static HTML
        run: |
          node .github/scripts/build-news.js
      
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/de/news/index.html
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Auto-build: Static news page updated" && git push)
