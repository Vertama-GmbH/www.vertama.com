baseURL = 'http://localhost:1313/'
theme = 'vertama'
defaultContentLanguage = 'de'
defaultContentLanguageInSubdir = false  # ← FIX: Kein /de/ Ping-Pong!

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true  # Allows HTML in markdown (needed for legacy content)

[params]
description = 'VERTAMA GmbH - Digitale Lösungen für Gesundheitswesen'
firmName = 'VERTAMA GmbH'

