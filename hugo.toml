baseURL = 'https://vertama.com/'
theme = 'vertama'
defaultContentLanguage = 'de'
defaultContentLanguageInSubdir = true

# Serve existing static HTML pages unchanged
staticDir = 'docs'

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

[params]
description = 'VERTAMA GmbH - Digitale Lösungen für Gesundheitswesen'
firmName = 'VERTAMA GmbH'

[languages]

# --- DEUTSCH ---
[languages.de]
languageCode = 'de-de'
languageName = 'Deutsch'
contentDir = 'content/de'
weight = 1
title = 'VERTAMA GmbH'

[languages.de.params]
copyrightText = 'Alle Rechte vorbehalten'
footerSlogan = 'Digitalisierung von Meldeverfahren für moderne Unternehmen. Schnell, sicher, effizient.'

[[languages.de.menu.main]]
name = 'Healthcare Services'
url = '/de/healthcareservices/'
weight = 1

[[languages.de.menu.main]]
